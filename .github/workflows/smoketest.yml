name: Smoke test latest release

on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - master
    paths:
    - 'docs/index.yaml'

jobs:
  smoketest:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Run smoke test hack script
      env:
        HEAD_REF: ${{ github.head_ref }}
      run: hack/smoke-test-release-branch.sh --release-branch "$HEAD_REF"

