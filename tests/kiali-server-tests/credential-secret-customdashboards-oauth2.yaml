name: "credential_secret_customdashboards_oauth2"
description: "Verify custom_dashboards prometheus OAuth2 client_secret secret is auto-mounted when using secret pattern (client_id is not a secret)"
helm_args:
  - "--set"
  - "external_services.custom_dashboards.enabled=true"
  - "--set"
  - "external_services.custom_dashboards.prometheus.auth.type=oauth2"
  - "--set"
  - "external_services.custom_dashboards.prometheus.auth.oauth2.client_id=my-cd-client"
  - "--set"
  - "external_services.custom_dashboards.prometheus.auth.oauth2.client_secret=secret:cd-oauth2:csec"
  - "--set"
  - "external_services.custom_dashboards.prometheus.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name | test(\"oauth2\")))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name | test(\"oauth2\"))))}"
expected_result: |
  volumes:
    - name: customdashboards-prometheus-oauth2-client-secret
      secret:
        secretName: cd-oauth2
        items:
          - key: csec
            path: value.txt
  volumeMounts:
    - name: customdashboards-prometheus-oauth2-client-secret
      mountPath: "/kiali-override-secrets/customdashboards-prometheus-oauth2-client-secret"
      readOnly: true
should_fail: false
