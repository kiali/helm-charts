name: "credential_secret_perses_oauth2"
description: "Verify perses OAuth2 secrets are auto-mounted when using secret pattern"
helm_args:
  - "--set"
  - "external_services.perses.enabled=true"
  - "--set"
  - "external_services.perses.auth.type=oauth2"
  - "--set"
  - "external_services.perses.auth.oauth2.client_id=secret:perses-creds:id"
  - "--set"
  - "external_services.perses.auth.oauth2.client_secret=secret:perses-creds:secret"
  - "--set"
  - "external_services.perses.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name == \"perses-oauth2-client-id\" or .name == \"perses-oauth2-client-secret\"))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name == \"perses-oauth2-client-id\" or .name == \"perses-oauth2-client-secret\")))}"
expected_result: |
  volumes:
    - name: perses-oauth2-client-id
      secret:
        secretName: perses-creds
        items:
          - key: id
            path: value.txt
    - name: perses-oauth2-client-secret
      secret:
        secretName: perses-creds
        items:
          - key: secret
            path: value.txt
  volumeMounts:
    - name: perses-oauth2-client-id
      mountPath: "/kiali-override-secrets/perses-oauth2-client-id"
      readOnly: true
    - name: perses-oauth2-client-secret
      mountPath: "/kiali-override-secrets/perses-oauth2-client-secret"
      readOnly: true
should_fail: false
