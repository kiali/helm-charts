name: "auth_oauth2_literal_secret_no_volume"
description: "When oauth2.client_secret is a literal value (not secret:name:key format), no secret volume should be mounted for oauth2"
helm_args:
  - "--set"
  - "external_services.prometheus.auth.type=oauth2"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_id=my-client"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_secret=literal-plain-secret"
  - "--set"
  - "external_services.prometheus.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | .spec.template.spec.volumes[] | select(.name | test(\"oauth2\")) | .name"
expected_result: ""
should_fail: false
