name: "oauth2_validation_tracing_grpc"
description: "Verify helm template fails when tracing uses oauth2 with use_grpc=true (default)"
helm_args:
  - "--set"
  - "external_services.tracing.enabled=true"
  - "--set"
  - "external_services.tracing.auth.type=oauth2"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_id=foo"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_secret=secret:my-secret:key"
  - "--set"
  - "external_services.tracing.auth.oauth2.token_url=https://token.example.com/token"
yq_query: ""
expected_result: ""
expected_error_pattern: "cannot use oauth2 auth with use_grpc=true"
should_fail: true
