name: "credential_secret_grafana_oauth2"
description: "Verify grafana OAuth2 client_id and client_secret secrets are auto-mounted when using secret:<name>:<key> pattern"
helm_args:
  - "--set"
  - "external_services.grafana.enabled=true"
  - "--set"
  - "external_services.grafana.auth.type=oauth2"
  - "--set"
  - "external_services.grafana.auth.oauth2.client_id=secret:grafana-oauth2:client-id"
  - "--set"
  - "external_services.grafana.auth.oauth2.client_secret=secret:grafana-oauth2:client-secret"
  - "--set"
  - "external_services.grafana.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name == \"grafana-oauth2-client-id\" or .name == \"grafana-oauth2-client-secret\"))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name == \"grafana-oauth2-client-id\" or .name == \"grafana-oauth2-client-secret\")))}"
expected_result: |
  volumes:
    - name: grafana-oauth2-client-id
      secret:
        secretName: grafana-oauth2
        items:
          - key: client-id
            path: value.txt
    - name: grafana-oauth2-client-secret
      secret:
        secretName: grafana-oauth2
        items:
          - key: client-secret
            path: value.txt
  volumeMounts:
    - name: grafana-oauth2-client-id
      mountPath: "/kiali-override-secrets/grafana-oauth2-client-id"
      readOnly: true
    - name: grafana-oauth2-client-secret
      mountPath: "/kiali-override-secrets/grafana-oauth2-client-secret"
      readOnly: true
should_fail: false
