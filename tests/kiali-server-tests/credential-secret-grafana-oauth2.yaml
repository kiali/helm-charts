name: "credential_secret_grafana_oauth2"
description: "Verify grafana OAuth2 client_secret secret is auto-mounted when using secret:<name>:<key> pattern (client_id is not a secret)"
helm_args:
  - "--set"
  - "external_services.grafana.enabled=true"
  - "--set"
  - "external_services.grafana.auth.type=oauth2"
  - "--set"
  - "external_services.grafana.auth.oauth2.client_id=my-grafana-client"
  - "--set"
  - "external_services.grafana.auth.oauth2.client_secret=secret:grafana-oauth2:client-secret"
  - "--set"
  - "external_services.grafana.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name | test(\"oauth2\")))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name | test(\"oauth2\"))))}"
expected_result: |
  volumes:
    - name: grafana-oauth2-client-secret
      secret:
        secretName: grafana-oauth2
        items:
          - key: client-secret
            path: value.txt
  volumeMounts:
    - name: grafana-oauth2-client-secret
      mountPath: "/kiali-override-secrets/grafana-oauth2-client-secret"
      readOnly: true
should_fail: false
