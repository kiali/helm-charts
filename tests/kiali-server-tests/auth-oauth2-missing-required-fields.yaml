name: "auth_oauth2_missing_required_fields"
description: "Validation fails when oauth2 type is set but all required fields (client_id, client_secret, token_url) are missing, even when optional fields like audience are present"
helm_args:
  - "--set"
  - "external_services.prometheus.auth.type=oauth2"
  - "--set"
  - "external_services.prometheus.auth.oauth2.audience=https://example.com"
yq_query: ""
expected_result: ""
expected_error_pattern: "requires client_id, client_secret, and token_url"
should_fail: true
