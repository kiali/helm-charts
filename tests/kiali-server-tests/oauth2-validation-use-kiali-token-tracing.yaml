name: "oauth2_validation_use_kiali_token_tracing"
description: "Verify helm template fails when tracing oauth2 is combined with use_kiali_token"
helm_args:
  - "--set"
  - "external_services.tracing.enabled=true"
  - "--set"
  - "external_services.tracing.use_grpc=false"
  - "--set"
  - "external_services.tracing.auth.type=oauth2"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_id=foo"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_secret=secret:my-secret:key"
  - "--set"
  - "external_services.tracing.auth.oauth2.token_url=https://token.example.com/token"
  - "--set"
  - "external_services.tracing.auth.use_kiali_token=true"
yq_query: ""
expected_result: ""
expected_error_pattern: "cannot use both oauth2 auth and use_kiali_token"
should_fail: true
