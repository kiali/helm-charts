name: "credential_secret_oauth2_security_guardrails"
description: "Verify oauth2 secret volumes are mounted with readOnly: true"
helm_args:
  - "--set"
  - "external_services.prometheus.auth.type=oauth2"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_id=my-client"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_secret=secret:my-creds:client-secret"
  - "--set"
  - "external_services.prometheus.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | .spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts[] | select(.name | test(\"oauth2\")) | {\"name\": .name, \"readOnly\": .readOnly}"
expected_result: |
  name: prometheus-oauth2-client-secret
  readOnly: true
should_fail: false
