name: "credential_secret_oauth2_disabled_tracing"
description: "When tracing is disabled, its oauth2 secret volume should not be mounted even if oauth2 is configured"
helm_args:
  - "--set"
  - "external_services.tracing.enabled=false"
  - "--set"
  - "external_services.tracing.auth.type=oauth2"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_id=my-client"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_secret=secret:my-creds:client-secret"
  - "--set"
  - "external_services.tracing.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | .spec.template.spec.volumes[] | select(.name | test(\"tracing.*oauth2\")) | .name"
expected_result: ""
should_fail: false
