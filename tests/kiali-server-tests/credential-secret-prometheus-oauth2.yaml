name: "credential_secret_prometheus_oauth2"
description: "Verify prometheus OAuth2 client_id and client_secret secrets are auto-mounted when using secret:<name>:<key> pattern"
helm_args:
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_id=secret:my-oauth2-creds:client-id"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_secret=secret:my-oauth2-creds:client-secret"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name == \"prometheus-oauth2-client-id\" or .name == \"prometheus-oauth2-client-secret\"))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name == \"prometheus-oauth2-client-id\" or .name == \"prometheus-oauth2-client-secret\")))}"
expected_result: |
  volumes:
    - name: prometheus-oauth2-client-id
      secret:
        secretName: my-oauth2-creds
        items:
          - key: client-id
            path: value.txt
    - name: prometheus-oauth2-client-secret
      secret:
        secretName: my-oauth2-creds
        items:
          - key: client-secret
            path: value.txt
  volumeMounts:
    - name: prometheus-oauth2-client-id
      mountPath: "/kiali-override-secrets/prometheus-oauth2-client-id"
      readOnly: true
    - name: prometheus-oauth2-client-secret
      mountPath: "/kiali-override-secrets/prometheus-oauth2-client-secret"
      readOnly: true
should_fail: false
