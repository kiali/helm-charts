name: "credential_secret_prometheus_oauth2"
description: "Verify prometheus OAuth2 client_secret secret is auto-mounted when using secret:<name>:<key> pattern (client_id is not a secret)"
helm_args:
  - "--set"
  - "external_services.prometheus.auth.type=oauth2"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_id=my-public-client-id"
  - "--set"
  - "external_services.prometheus.auth.oauth2.client_secret=secret:my-oauth2-creds:client-secret"
  - "--set"
  - "external_services.prometheus.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name | test(\"oauth2\")))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name | test(\"oauth2\"))))}"
expected_result: |
  volumes:
    - name: prometheus-oauth2-client-secret
      secret:
        secretName: my-oauth2-creds
        items:
          - key: client-secret
            path: value.txt
  volumeMounts:
    - name: prometheus-oauth2-client-secret
      mountPath: "/kiali-override-secrets/prometheus-oauth2-client-secret"
      readOnly: true
should_fail: false
