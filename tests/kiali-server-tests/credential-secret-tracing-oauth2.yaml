name: "credential_secret_tracing_oauth2"
description: "Verify tracing OAuth2 secrets are auto-mounted when using secret pattern with use_grpc=false"
helm_args:
  - "--set"
  - "external_services.tracing.enabled=true"
  - "--set"
  - "external_services.tracing.use_grpc=false"
  - "--set"
  - "external_services.tracing.auth.type=oauth2"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_id=secret:tracing-oauth2:cid"
  - "--set"
  - "external_services.tracing.auth.oauth2.client_secret=secret:tracing-oauth2:csecret"
  - "--set"
  - "external_services.tracing.auth.oauth2.token_url=https://idp.example.com/token"
yq_query: "select(.kind == \"Deployment\") | {\"volumes\": (.spec.template.spec.volumes | map(select(.name == \"tracing-oauth2-client-id\" or .name == \"tracing-oauth2-client-secret\"))), \"volumeMounts\": (.spec.template.spec.containers[] | select(.name == \"kiali\") | .volumeMounts | map(select(.name == \"tracing-oauth2-client-id\" or .name == \"tracing-oauth2-client-secret\")))}"
expected_result: |
  volumes:
    - name: tracing-oauth2-client-id
      secret:
        secretName: tracing-oauth2
        items:
          - key: cid
            path: value.txt
    - name: tracing-oauth2-client-secret
      secret:
        secretName: tracing-oauth2
        items:
          - key: csecret
            path: value.txt
  volumeMounts:
    - name: tracing-oauth2-client-id
      mountPath: "/kiali-override-secrets/tracing-oauth2-client-id"
      readOnly: true
    - name: tracing-oauth2-client-secret
      mountPath: "/kiali-override-secrets/tracing-oauth2-client-secret"
      readOnly: true
should_fail: false
