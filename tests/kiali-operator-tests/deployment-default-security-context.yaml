name: "deployment_default_security_context"
description: "Verify operator container has the expected default security context including seccompProfile"
helm_args: []
yq_query: "select(.kind == \"Deployment\") | .spec.template.spec.containers[0].securityContext"
expected_result: |
  allowPrivilegeEscalation: false
  privileged: false
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL
should_fail: false
