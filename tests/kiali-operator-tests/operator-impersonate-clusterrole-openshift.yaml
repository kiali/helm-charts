name: "operator_impersonate_clusterrole_openshift"
description: "Operator ClusterRole includes impersonate on users and groups on OpenShift (unconditional rule)"
helm_args:
  - "--set"
  - "isOpenShift=true"
yq_query: >
  select(.kind == "ClusterRole") |
  .rules[] | select(.verbs[] == "impersonate") |
  {"apiGroups": .apiGroups[0], "resources": .resources, "verbs": .verbs}
expected_result: |
  apiGroups: ""
  resources:
    - groups
    - users
  verbs:
    - impersonate
should_fail: false
